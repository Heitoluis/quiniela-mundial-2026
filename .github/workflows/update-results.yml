name: Actualizar resultados

# IMPORTANTE: los workflows con 'schedule' (cron) en GitHub son de baja
# prioridad: se retrasan horas o se saltan, sobre todo los de alta frecuencia.
# Por eso NO confiamos en que el cron corra cada 5 min. En su lugar, un solo job
# se mantiene vivo ~5h40m y hace fetch+commit cada 5 min internamente (en repos
# publicos el tiempo de Actions es gratis/ilimitado). El cron solo sirve para
# relanzar el job cuando termina; la concurrencia evita que corran dos a la vez.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bucle de actualizacion (cada ~5 min durante ~5h40m)
        run: |
          set +e
          API="https://worldcup26.ir/get/games"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          END=$(( $(date +%s) + 340*60 ))   # ~5h40m; deja margen al timeout de 350
          iter=0
          while [ "$(date +%s)" -lt "$END" ]; do
            iter=$((iter+1))

            # 1) Descargar con reintentos (el servidor externo es lento/inestable)
            ok=0
            for i in 1 2 3 4 5 6; do
              code=$(curl -s -m 60 \
                -H "Accept: application/json" \
                -H "Origin: https://heitoluis.github.io" \
                -o results.new.json -w "%{http_code}" "$API" || echo 000)
              if [ "$code" = "200" ] && jq -e '.games | length > 0' results.new.json >/dev/null 2>&1; then
                ok=1; break
              fi
              sleep 10
            done

            if [ "$ok" != "1" ]; then
              echo "[$(date -u +%T)] iter $iter: fetch fallido, se conserva lo anterior."
            else
              # 2) Commit solo si cambiaron los marcadores (evita reconstruir Pages de mas)
              git show HEAD:results.json 2>/dev/null | jq -S '.games' > prev_games.json 2>/dev/null || echo 'null' > prev_games.json
              jq -S '.games' results.new.json > curr_games.json
              if cmp -s prev_games.json curr_games.json; then
                echo "[$(date -u +%T)] iter $iter: sin cambios."
              else
                jq --arg ts "$(date -u +%FT%TZ)" '. + {updated_at: $ts}' results.new.json > results.json
                git add results.json
                git commit -m "Actualizar resultados" >/dev/null 2>&1
                git pull --rebase --autostash origin main >/dev/null 2>&1
                if git push origin HEAD:main >/dev/null 2>&1; then
                  echo "[$(date -u +%T)] iter $iter: actualizado y publicado."
                else
                  echo "::warning::[$(date -u +%T)] iter $iter: push fallido, se reintenta en la siguiente vuelta."
                fi
              fi
            fi

            rm -f results.new.json prev_games.json curr_games.json
            sleep 300   # 5 minutos
          done
          echo "Fin del bucle; el cron relanzara el job."
