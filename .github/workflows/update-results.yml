name: Actualizar resultados

# Mantiene results.json al dia consultando, en orden:
#   1) ESPN (FIFA World Cup) - gratis, sin key, confiable y con datos en vivo.
#   2) worldcup26.ir - respaldo, por si ESPN fallara.
# La salida siempre tiene el formato { games: [...] } que la pagina ya entiende
# (empareja por nombre de equipo), asi que index.html no requiere cambios.
#
# Nota: los workflows 'schedule' de GitHub son de baja prioridad (se retrasan o
# se saltan). Por eso un solo job se mantiene vivo ~5h40m y refresca cada 5 min;
# el cron solo lo relanza al terminar. Gratis por ser repo publico.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bucle de actualizacion (cada ~5 min durante ~5h40m)
        run: |
          set +e
          ESPN="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200"
          WC="https://worldcup26.ir/get/games"

          # ESPN -> formato { games: [{home_team_name_en, away_team_name_en, home_score, away_score, finished, time_elapsed}] }
          ESPN_JQ='{games: [.events[] | .competitions[0] as $c | ($c.competitors[] | select(.homeAway=="home")) as $h | ($c.competitors[] | select(.homeAway=="away")) as $a | {home_team_name_en: $h.team.displayName, away_team_name_en: $a.team.displayName, home_score: (($h.score // "") | tostring), away_score: (($a.score // "") | tostring), finished: (if .status.type.completed then "TRUE" else "FALSE" end), time_elapsed: (if .status.type.completed then "finished" elif .status.type.name == "STATUS_SCHEDULED" then "notstarted" else "live" end)}]}'

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          END=$(( $(date +%s) + 340*60 ))   # ~5h40m
          iter=0
          while [ "$(date +%s)" -lt "$END" ]; do
            iter=$((iter+1))
            src=""

            # 1) Fuente primaria: ESPN
            code=$(curl -s -m 45 --retry 2 --retry-delay 3 -o espn.json -w "%{http_code}" "$ESPN" || echo 000)
            if [ "$code" = "200" ] && jq -e '.events | length > 0' espn.json >/dev/null 2>&1; then
              if jq "$ESPN_JQ" espn.json > cand.json 2>/dev/null && jq -e '.games | length > 0' cand.json >/dev/null 2>&1; then
                src="espn"
              fi
            fi

            # 2) Respaldo: worldcup26.ir (se usa tal cual, mismo formato)
            if [ -z "$src" ]; then
              code=$(curl -s -m 60 -H "Accept: application/json" -H "Origin: https://heitoluis.github.io" -o wc.json -w "%{http_code}" "$WC" || echo 000)
              if [ "$code" = "200" ] && jq -e '.games | length > 0' wc.json >/dev/null 2>&1; then
                cp wc.json cand.json
                src="worldcup26"
              fi
            fi

            if [ -z "$src" ]; then
              echo "[$(date -u +%T)] iter $iter: ambas fuentes fallaron; se conserva lo anterior."
            else
              # Commit solo si cambiaron los marcadores
              git show HEAD:results.json 2>/dev/null | jq -S '.games' > prev.json 2>/dev/null || echo null > prev.json
              jq -S '.games' cand.json > curr.json
              if cmp -s prev.json curr.json; then
                echo "[$(date -u +%T)] iter $iter: sin cambios (fuente=$src)."
              else
                jq --arg ts "$(date -u +%FT%TZ)" --arg src "$src" '. + {updated_at: $ts, source: $src}' cand.json > results.json
                git add results.json
                git commit -m "Actualizar resultados ($src)" >/dev/null 2>&1
                git pull --rebase --autostash origin main >/dev/null 2>&1
                if git push origin HEAD:main >/dev/null 2>&1; then
                  echo "[$(date -u +%T)] iter $iter: publicado (fuente=$src)."
                else
                  echo "::warning::[$(date -u +%T)] iter $iter: push fallido, se reintenta luego."
                fi
              fi
            fi

            rm -f espn.json wc.json cand.json prev.json curr.json
            sleep 300
          done
          echo "Fin del bucle; el cron relanzara el job."
